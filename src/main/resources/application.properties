spring.application.name=datelocator-be

spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=datelocator
spring.datasource.password=datelocator
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.datelocator.datelocatorbe=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always
server.address=0.0.0.0
server.port=8080

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/datelocator

# Swagger UI OAuth2 settings
springdoc.swagger-ui.oauth.client-id=datelocator-api
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true